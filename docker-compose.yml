version: "3.9"

services:
  bank-platform:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: bank-data-platform
    environment:
      - AZURE_SQL_SERVER=${AZURE_SQL_SERVER:-}
      - AZURE_SQL_DATABASE=${AZURE_SQL_DATABASE:-}
      - AZURE_SQL_USER=${AZURE_SQL_USER:-}
      - AZURE_SQL_PASSWORD=${AZURE_SQL_PASSWORD:-}
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - ./docs/data_quality_reports:/app/docs/data_quality_reports
    command: ["bash", "docker/run_pipeline.sh"]

  # Optional: local SQL Server container so the whole pipeline (including the
  # warehouse load + DBT) can be exercised fully offline without an Azure
  # subscription. Swap sql_warehouse.server in config.yaml to "sqlserver"
  # (the service name below) when using this.
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: bank-sql-local
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=${MSSQL_SA_PASSWORD:-YourStrong@Passw0rd}
    ports:
      - "1433:1433"
    volumes:
      - sql_data:/var/opt/mssql

volumes:
  sql_data:
